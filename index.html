<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d4ed8" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Nigeria Business Tax Calculator</title>

    <!-- Google Fonts: Inter for body text — clean, professional, used by fintechs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>" />
  </head>
  <body>
    <!--
      This div is the "root" — React will inject the entire app here.
      Everything you see in the browser comes from React components,
      not from this HTML file directly.
    -->
    <div id="root"></div>

    <!--
      This script tag loads our React app.
      The "type=module" tells the browser this is modern JavaScript (ES Modules).
      Vite handles bundling everything together.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
